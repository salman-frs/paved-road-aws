backstage:
  appConfig:
    app:
      title: Salman FRS Platform
      baseUrl: https://backstage.salmanfrs.dev
    organization:
      name: Salman FRS
    backend:
      baseUrl: https://backstage.salmanfrs.dev
    integrations:
      github:
        - host: github.com
    auth:
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
    techdocs:
      builder: local
    catalog:
      rules:
        - allow:
            - Component
            - API
            - Location
            - Template
      locations:
        - type: url
          target: https://github.com/salman-frs/paved-road-aws/blob/main/services/orders-api/catalog-info.yaml
        - type: url
          target: https://github.com/salman-frs/paved-road-aws/blob/main/platform/templates/service-api/template.yaml

service:
  type: ClusterIP

ingress:
  enabled: true
  className: nginx
  host: backstage.salmanfrs.dev
