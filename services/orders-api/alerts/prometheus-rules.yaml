apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: orders-api
spec:
  groups:
    - name: orders-api.alerts
      rules:
        - alert: OrdersApiHighErrorRate
          expr: sum(rate(http_server_duration_count{service_name="orders-api",http_response_status_code=~"5.."}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Elevated error rate for orders-api
